<!DOCTYPE html>
<html>
<head>
    <title>Create Baby Profile</title>
    <link rel="stylesheet" href="css/profile.css">
</head>

<body>

<div class="top-buttons">
    <a href="dashboard.html" class="dash-btn">← Back to Dashboard</a>
</div>

<h2>Create Baby Profile</h2>

<div class="profile-box">

<form action="php/save_profile.php" method="POST" enctype="multipart/form-data">

<input type="text" name="name" placeholder="Baby Name" required>

<input type="date" name="dob" required>

<select name="gender">
<option value="Male">Male</option>
<option value="Female">Female</option>
</select>

<input type="text" name="weight" placeholder="Weight" required>

<input type="text" name="height" placeholder="Height" required>

<input type="text" name="blood" placeholder="Blood Group">

<input type="text" name="parent" placeholder="Parent Name">

<input type="file" name="image" required>

<button type="submit">Save Profile</button>

</form>

</div>

</body>
</html>
